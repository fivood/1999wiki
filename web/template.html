<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — 1999剧情Wiki</title>
  <!-- 双主题：pixel.css = 像素版（默认）；style.css = 经典版 -->
  <link id="cssPixel" rel="stylesheet" href="{{root}}pixel.css">
  <link id="cssClassic" rel="stylesheet" href="{{root}}style.css" disabled>
  <script>
    /* 主题引导：首绘前按 localStorage 选择样式表，避免闪烁 */
    (function () {
      var t = null;
      try { t = localStorage.getItem('wiki-theme'); } catch (e) {}
      var theme = (t === 'classic') ? 'classic' : 'pixel';
      document.documentElement.dataset.theme = theme;
      document.getElementById('cssPixel').disabled = (theme !== 'pixel');
      document.getElementById('cssClassic').disabled = (theme !== 'classic');
    })();
  </script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
</head>
<body class="{{bodyclass}}">
  <header class="site-header">
    <button class="menu-toggle" id="menuToggle" aria-label="切换菜单">☰</button>
    <a href="{{root}}index.html" class="site-title"><span class="site-icon">📖 </span><span class="site-name">1999剧情Wiki</span><small>THE REVERSE: 1999 CHRONICLE</small></a>
    <div class="header-search">
      <input type="text" id="searchInput" placeholder="搜索..." autocomplete="off">
      <div id="searchResults" class="search-results"></div>
    </div>
    <button id="themeSwitch" class="theme-switch" type="button" aria-label="切换界面主题">经典版</button>
  </header>

  <!-- 像素版专属固定装饰（经典版隐藏） -->
  <div class="px-edge" aria-hidden="true">REVERSE:1999 — STORY ARCHIVE</div>
  <div class="px-coord" aria-hidden="true">SIG/1999.12.31 // CH-01 ▚▚▚</div>
  <!-- 像素版圆环菜单 + D20 今日报纸（经典版隐藏，内容由脚本从侧边栏导航构建） -->
  <div id="pxOrb" class="px-orb" aria-label="圆环导航"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav class="nav-tree">
        {{nav}}
      </nav>
    </aside>

    <main class="content">
      {{watermark}}
      <article>
        {{breadcrumbs}}
        {{content}}
      </article>
      <footer class="page-footer">
        <p>本站为《重返未来：1999》同人剧情知识库，仅供创作参考。</p>
        <p>所有角色、剧情及世界观设定版权归 <strong>深蓝互动- BLUEPOCH
</strong> 所有。</p>
      </footer>
    </main>
  </div>

  <!-- 灯箱遮罩 -->
  <div id="lb" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out">
    <img id="lbImg" src="" alt="" style="max-width:92vw;max-height:92vh;object-fit:contain;display:block;pointer-events:none">
  </div>

  <script>
    /* 主题切换（像素版 ⇄ 经典版），localStorage 记忆 */
    const themeSwitch = document.getElementById('themeSwitch');
    function currentTheme() {
      return document.documentElement.dataset.theme === 'classic' ? 'classic' : 'pixel';
    }
    function updateSwitchLabel() {
      themeSwitch.textContent = currentTheme() === 'pixel' ? '经典版' : '像素版';
    }
    themeSwitch.addEventListener('click', () => {
      const next = currentTheme() === 'pixel' ? 'classic' : 'pixel';
      document.documentElement.dataset.theme = next;
      try { localStorage.setItem('wiki-theme', next); } catch (e) {}
      document.getElementById('cssPixel').disabled = (next !== 'pixel');
      document.getElementById('cssClassic').disabled = (next !== 'classic');
      updateSwitchLabel();
    });
    updateSwitchLabel();

    /* 移动端菜单切换 */
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
        if (!sidebar.contains(e.target) && e.target !== menuToggle) {
          sidebar.classList.remove('open');
        }
      }
    });

    /* 搜索 */
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    let searchIndex = [];

    fetch('{{root}}search.json')
      .then(r => r.json())
      .then(data => { searchIndex = data; })
      .catch(() => {});

    function doSearch(q) {
      if (!q || q.length < 1) { searchResults.innerHTML = ''; return; }
      const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
      const scored = searchIndex.map(item => {
        let score = 0;
        const t = item.title.toLowerCase();
        const c = (item.text || '').toLowerCase();
        for (const term of terms) {
          if (t === term) score += 10;
          else if (t.startsWith(term)) score += 7;
          else if (t.includes(term)) score += 5;
          const idx = c.indexOf(term);
          if (idx !== -1) score += 2;
        }
        return { ...item, score };
      }).filter(i => i.score > 0).sort((a, b) => b.score - a.score).slice(0, 12);

      if (scored.length === 0) {
        searchResults.innerHTML = '<div class="no-result">无结果</div>';
        return;
      }
      searchResults.innerHTML = scored.map(i => {
        const url = '{{root}}' + i.url;
        let snippet = '';
        if (i.text) {
          const idx = i.text.toLowerCase().indexOf(terms[0]);
          const start = Math.max(0, idx - 40);
          snippet = i.text.slice(start, start + 120);
          if (start > 0) snippet = '…' + snippet;
          if (start + 120 < i.text.length) snippet += '…';
        }
        return `<a href="${url}" class="search-item"><div class="search-item-title">${i.title}</div>${snippet ? `<div class="search-item-snippet">${snippet}</div>` : ''}</a>`;
      }).join('');
    }

    searchInput.addEventListener('input', e => doSearch(e.target.value.trim()));
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Escape') { searchInput.value = ''; searchResults.innerHTML = ''; }
    });
    document.addEventListener('click', e => {
      if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.innerHTML = '';
      }
    });

    /* 画廊页卡切换（作用域限定在各自 gallery-tab-group，立绘与单品互不干扰） */
    document.addEventListener('click', e => {
      const tab = e.target.closest('.gallery-tab');
      if (!tab) return;
      const group = tab.closest('.gallery-tab-group');
      if (!group) return;
      const idx = [...group.querySelectorAll(':scope > .gallery-tabs > .gallery-tab')].indexOf(tab);
      group.querySelectorAll(':scope > .gallery-tabs > .gallery-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
      group.querySelectorAll(':scope > .gallery-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
    });

    /* 灯箱 */
    const lb = document.getElementById('lb');
    const lbImg = document.getElementById('lbImg');
    document.addEventListener('click', e => {
      const t = e.target.closest('.lb-trigger');
      if (t) { lbImg.src = t.dataset.src; lb.style.display = 'flex'; }
    });
    lb.addEventListener('click', () => { lb.style.display = 'none'; lbImg.src = ''; });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { lb.style.display = 'none'; lbImg.src = ''; }
    });

    /* 报纸日期：按用户本地时区显示 */
    const newspaperDate = document.getElementById('newspaperDate');
    if (newspaperDate) {
      newspaperDate.textContent = new Date().toLocaleDateString('zh-CN', {
        year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
      });
    }

    /* 滚动浮现动效（.rv 样式仅像素版定义，经典版无视觉效果） */
    (function () {
      if (!('IntersectionObserver' in window)) return;
      if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const els = document.querySelectorAll('article > *, .np-story');
      if (!els.length) return;
      els.forEach(el => el.classList.add('rv'));
      const io = new IntersectionObserver((entries) => {
        entries.forEach(en => {
          if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); }
        });
      }, { threshold: 0.04, rootMargin: '0px 0px -4% 0px' });
      els.forEach(el => io.observe(el));
    })();

    /* ── 像素版圆环菜单 + D20 今日报纸 ──
       从 .nav-tree DOM 解析分组；经典版中 .px-orb 隐藏，此处仅构建不展示 */
    (function () {
      const orb = document.getElementById('pxOrb');
      const nav = document.querySelector('.nav-tree');
      if (!orb || !nav) return;

      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const stripArrow = s => s.replace(/[▾▶]/g, '').trim();

      /* 解析分组（含二级子分组与当前状态） */
      const groups = [...nav.querySelectorAll(':scope > .nav-group')].map(g => {
        const titleEl = g.querySelector('.nav-group-title');
        const items = [];
        g.querySelectorAll(':scope > .nav-list > li').forEach(li => {
          if (li.classList.contains('nav-subgroup')) {
            const st = li.querySelector('.nav-subgroup-title');
            const links = [...li.querySelectorAll('.nav-sublist a')]
              .map(a => ({ t: a.textContent.trim(), h: a.getAttribute('href'), cur: a.classList.contains('active') }));
            items.push({ sub: stripArrow(st ? st.textContent : ''), links });
          } else {
            const a = li.querySelector('a');
            if (!a) return;
            /* 「今日报纸」不进圆环菜单——由 D20 骰子承载 */
            if (a.textContent.trim() === '今日报纸') return;
            items.push({ t: a.textContent.trim(), h: a.getAttribute('href'), cur: a.classList.contains('active') });
          }
        });
        return {
          title: stripArrow(titleEl ? titleEl.textContent : ''),
          items,
          cur: g.classList.contains('current'),
        };
      });
      if (!groups.length) return;

      /* ── 组装圆环 DOM：一级白条只分布在右上 1/4 弧（约 90° 内），
         每条长轴径向指向圆心；不再自转，用 CSS 伸长表达"选中" ── */
      const ARC_START = -32, ARC_SPAN = 88;
      const step = groups.length > 1 ? ARC_SPAN / (groups.length - 1) : 0;
      const barAngle = i => ARC_START + i * step;
      let html = '<div class="px-orb-rings">'
        + '<div class="px-orb-cross"></div>'
        + '<div class="px-orb-ring r1"></div>'
        + '<div class="px-orb-ring r3"></div>'
        + '<div class="px-orb-ring r2"></div>'
        + '<div class="px-orb-ticks"></div>'
        + '<div class="px-orb-bars" id="pxOrbBars">';
      groups.forEach((g, i) => {
        html += `<span class="px-orb-bar${g.cur ? ' cur' : ''}" data-i="${i}" tabindex="0" role="button" style="--a:${barAngle(i).toFixed(2)}deg;--i:${i}"><i>${String(i + 1).padStart(2, '0')}</i>${esc(g.title)}</span>`;
      });
      html += '</div></div>';

      /* ── D20 骰子 SVG（二十面体正面投影：正六边形外廓，10 个三角面无缝拼合，左上光照） ── */
      const dieSvg = `
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <g stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round">
    <polygon points="100,14 25.5,57 100,66"   fill="#3b3b3b"/>
    <polygon points="25.5,57 100,66 71,117"  fill="#343434"/>
    <polygon points="25.5,57 71,117 25.5,143" fill="#2e2e2e"/>
    <polygon points="100,14 100,66 174.5,57" fill="#292929"/>
    <polygon points="100,66 71,117 129,117"  fill="#242424"/>
    <polygon points="100,66 174.5,57 129,117" fill="#202020"/>
    <polygon points="174.5,57 174.5,143 129,117" fill="#1b1b1b"/>
    <polygon points="71,117 100,186 25.5,143" fill="#161616"/>
    <polygon points="71,117 129,117 100,186" fill="#111111"/>
    <polygon points="129,117 174.5,143 100,186" fill="#0c0c0c"/>
  </g>
  <polygon points="100,14 174.5,57 174.5,143 100,186 25.5,143 25.5,57" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round"/>
  <text class="die-f" x="75" y="46" text-anchor="middle" dominant-baseline="central">18</text>
  <text class="die-f" x="125" y="46" text-anchor="middle" dominant-baseline="central">4</text>
  <text class="die-f" x="66" y="80" text-anchor="middle" dominant-baseline="central">2</text>
  <text class="die-f" x="134" y="80" text-anchor="middle" dominant-baseline="central">14</text>
  <text class="die-f" x="41" y="106" text-anchor="middle" dominant-baseline="central" transform="rotate(-90 41 106)">12</text>
  <text class="die-f" x="159" y="106" text-anchor="middle" dominant-baseline="central" transform="rotate(90 159 106)">9</text>
  <text class="die-f" x="66" y="149" text-anchor="middle" dominant-baseline="central" transform="rotate(180 66 149)">10</text>
  <text class="die-f" x="134" y="149" text-anchor="middle" dominant-baseline="central" transform="rotate(180 134 149)">16</text>
  <text class="die-f" x="100" y="140" text-anchor="middle" dominant-baseline="central" transform="rotate(180 100 140)">8</text>
  <text class="die-num" id="pxDieNum" x="100" y="100" text-anchor="middle" dominant-baseline="central">20</text>
</svg>`;
      /* 背面：同图无 id（3D 原地转动时可见） */
      const dieSvgBack = dieSvg.replace(' id="pxDieNum"', '');
      html += '<div class="px-orb-hub">'
        + '<div class="px-die" id="pxDie" role="button" tabindex="0" aria-label="今日报纸：掷骰随机跳转词条">'
        + '<div class="px-die-3d"><div class="px-die-face front">'
        + dieSvg
        + '</div><div class="px-die-face back" aria-hidden="true">'
        + dieSvgBack
        + '</div></div>'
        + '</div><div class="px-die-cap" id="pxDieCap"></div></div>';
      html += '<div class="px-fan-layer" id="pxFan1"></div><div class="px-fan-layer" id="pxFan2"></div>';
      orb.innerHTML = html;

      /* ── 菜单交互：一级白条静止分布在右上 1/4 弧；选中时该条 CSS 伸长（padding-right 过渡），
         扇形从其外端继续径向展开，两级都指向骰子；点词条后菜单收缩成小骰 ── */
      const ring2El = orb.querySelector('.px-orb-ring.r2');
      const fan1 = orb.querySelector('#pxFan1');
      const fan2 = orb.querySelector('#pxFan2');
      const reduceMotion = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
      const WIN = 8;                     /* 扇形窗口条数：超出用滚轮滑动 */
      const isHome = document.body.classList.contains('px-home');
      let hideT = null;
      let fan1State = null, fan2State = null;

      /* 正文进场：内容页带 px-enter 载入，首绘后移除以触发挤压展开动画 */
      if (document.body.classList.contains('px-enter')) {
        requestAnimationFrame(() => requestAnimationFrame(() => document.body.classList.remove('px-enter')));
      }

      function closeFans() {
        fan1.innerHTML = ''; fan2.innerHTML = '';
        fan1.classList.remove('dim');
        fan1State = null; fan2State = null;
      }
      function collapseOrb() {
        closeFans();
        document.body.classList.add('px-shut');
        orb.querySelectorAll('.px-orb-bar.act').forEach(b => b.classList.remove('act'));
      }
      function expandOrb() {
        document.body.classList.remove('px-shut');
      }
      /* 词条跳转：先收缩菜单（可见挤压动画），再导航 */
      function goHref(h) {
        if (!h) return;
        collapseOrb();
        setTimeout(() => { location.href = h; }, reduceMotion ? 0 : 500);
      }

      /* ── 径向扇形菜单：每条词条 = 沿所在半径方向书写的文字射线（径向指向骰子），
         从被选中的一级白条外端继续向外级联展开；超过 WIN 条开窗，滚轮滑动 ── */
      const r2Now = () => ring2El.offsetWidth / 2;
      /* 一级白条伸长后的外端半径（与 CSS .px-orb-bar.act 的 padding 增量对应） */
      const BAR_EXT = 68;
      function drawFan(layer, st, instant) {
        layer.innerHTML = '';
        layer.classList.toggle('instant', !!instant);
        const hubRect = orb.getBoundingClientRect();
        const vw = window.innerWidth, vh = window.innerHeight;
        const overflow = st.entries.length > WIN;
        const vis = overflow ? st.entries.slice(st.off, st.off + WIN) : st.entries;
        /* 自适应角度步长：末条（最大半径+估算文字长）不越出视口下缘时才用满步长，
           视口偏矮则压缩张角，保证半径级联完整、逐层单调变大 */
        let stepA = st.stepA;
        if (vis.length > 1) {
          const outerR = st.r0 + (vis.length - 1) * st.dr + 120;
          const fitSin = (vh - hubRect.top - 40) / outerR;
          if (fitSin < 1) {
            const maxA = Math.asin(Math.max(0.1, fitSin)) * 180 / Math.PI;
            if (st.a0 + (vis.length - 1) * stepA > maxA) {
              stepA = Math.max(4.5, (maxA - st.a0) / (vis.length - 1));
            }
          }
        }
        vis.forEach((it, k) => {
          const a = st.a0 + k * stepA;
          const rad = a * Math.PI / 180;
          const item = document.createElement('div');
          /* 深角度（>95°）整字翻转，保持文字不倒置 */
          item.className = 'px-fan-item' + (a > 95 ? ' flip' : '');
          item.style.setProperty('--a', a.toFixed(2) + 'deg');
          item.style.setProperty('--d', (k * 36) + 'ms');
          const el = document.createElement(it.h ? 'a' : 'span');
          el.className = 'px-fan-txt' + (it.sub ? ' sub' : '') + (it.cur ? ' cur' : '');
          el.textContent = it.t;
          if (it.h) el.href = it.h;
          else el.tabIndex = 0;
          item.appendChild(el);
          layer.appendChild(item);
          /* 先量文字宽，再按视口钳制半径（词条不出屏），下限保持在环外 */
          const w = el.offsetWidth;
          let R = st.r0 + k * st.dr;
          const cos = Math.cos(rad), sin = Math.sin(rad);
          if (cos > 0.05) R = Math.min(R, (vw - hubRect.left - 26) / cos - w);
          if (sin > 0.05) R = Math.min(R, (vh - hubRect.top - 40) / sin - w);
          R = Math.max(R, st.rMin);
          el.style.left = R + 'px';
          /* 射线：从基准半径引至文字起点，逐层拉长（草图中的「线条」本体） */
          const rayFrom = Math.min(st.rayBase, R - 16);
          const ray = document.createElement('i');
          ray.className = 'px-fan-ray';
          ray.style.left = rayFrom + 'px';
          ray.style.width = Math.max(0, R - 8 - rayFrom) + 'px';
          item.appendChild(ray);
          const dot = document.createElement('i');
          dot.className = 'px-fan-dot';
          dot.style.left = rayFrom + 'px';
          item.appendChild(dot);
          if (it.links) {
            /* 子分组：二级沿本词条射线继续向外、向下级联展开（一级同时压暗） */
            const openL2 = () => {
              clearTimeout(hideT);
              fan1.querySelectorAll('.px-fan-txt.open').forEach(x => x.classList.remove('open'));
              el.classList.add('open');
              fan1.classList.add('dim');
              fan2State = {
                entries: it.links,
                a0: a + 7.5, stepA: 7,
                r0: R + w + 44, dr: 22,
                rayBase: R + w + 16, rMin: r2Now() + 40,
                off: 0,
              };
              drawFan(fan2, fan2State, false);
            };
            el.addEventListener('mouseenter', openL2);
            el.addEventListener('click', openL2);
            el.addEventListener('keydown', e => {
              if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openL2(); }
            });
          } else {
            el.addEventListener('mouseenter', () => {
              clearTimeout(hideT);
              if (layer === fan1) {
                fan2.innerHTML = ''; fan2State = null;
                fan1.classList.remove('dim');
                fan1.querySelectorAll('.px-fan-txt.open').forEach(x => x.classList.remove('open'));
              }
            });
            /* 点中词条：菜单收缩成小骰（挤压动画）后跳转 */
            el.addEventListener('click', e => {
              if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
              e.preventDefault();
              goHref(it.h);
            });
          }
          el.addEventListener('mouseleave', scheduleHide);
        });
        /* 窗口范围指示（▲/▼ 实心 = 该方向可滚）：占用扇形末端下一条射线位 */
        if (overflow) {
          const end = Math.min(st.off + WIN, st.entries.length);
          const item = document.createElement('div');
          item.className = 'px-fan-item';
          const ra = st.a0 + vis.length * stepA;
          item.style.setProperty('--a', ra.toFixed(2) + 'deg');
          const rg = document.createElement('i');
          rg.className = 'px-fan-range';
          rg.textContent = (st.off > 0 ? '▲ ' : '△ ')
            + (st.off + 1) + '–' + end + '/' + st.entries.length
            + (end < st.entries.length ? ' ▼' : ' ▽');
          item.appendChild(rg);
          layer.appendChild(item);
          /* 指示条同样按视口钳制半径（必要时退到环内），保证始终可见 */
          const rw = rg.offsetWidth;
          const rrad = ra * Math.PI / 180;
          let RR = st.rayBase + 10;
          if (Math.cos(rrad) > 0.05) RR = Math.min(RR, (vw - hubRect.left - 20) / Math.cos(rrad) - rw);
          if (Math.sin(rrad) > 0.05) RR = Math.min(RR, (vh - hubRect.top - 20) / Math.sin(rrad) - rw);
          rg.style.left = Math.max(RR, 120) + 'px';
        }
      }
      /* 选中一级分组：无旋转、无闪烁——仅切换 .act 触发 CSS 伸长，扇形直接从条外端展开 */
      function showGroup(i) {
        clearTimeout(hideT);
        closeFans();
        orb.querySelectorAll('.px-orb-bar').forEach(b => b.classList.toggle('act', +b.dataset.i === i));
        if (!groups[i].items.length) return;
        openGroup(i);
      }
      /* 从被选中白条外端向外径向展开：词条按其半径角度书写（指向骰子），角度稍散、半径逐层加大 */
      function openGroup(i) {
        const g = groups[i];
        const entries = g.items.map(it => it.sub
          ? { t: it.sub, sub: true, links: it.links }
          : it);
        if (!entries.length) return;
        const bar = orb.querySelector('.px-orb-bar[data-i="' + i + '"]');
        const barA = +bar.style.getPropertyValue('--a').replace('deg', '') || 0;
        const r2 = r2Now();
        /* 白条实际外端半径 = r2 + 条宽 + 伸长量（条宽 = 未伸长的 offsetWidth） */
        const barOuterR = r2 + bar.offsetWidth + BAR_EXT;
        fan1State = {
          entries,
          a0: barA + 6, stepA: 6.5,
          r0: barOuterR + 30, dr: 26,
          rayBase: barOuterR + 4, rMin: barOuterR + 20,
          off: 0,
        };
        drawFan(fan1, fan1State, false);
      }
      function scheduleHide() {
        clearTimeout(hideT);
        hideT = setTimeout(() => {
          closeFans();
          orb.querySelectorAll('.px-orb-bar.act').forEach(b => b.classList.remove('act'));
        }, 450);
      }
      orb.querySelectorAll('.px-orb-bar').forEach(el => {
        const i = +el.dataset.i;
        el.addEventListener('mouseenter', () => showGroup(i));
        el.addEventListener('click', () => showGroup(i));
        el.addEventListener('focus', () => showGroup(i));
        el.addEventListener('blur', scheduleHide);
        el.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showGroup(i); }
        });
      });
      orb.addEventListener('mouseenter', () => clearTimeout(hideT));
      orb.addEventListener('mouseleave', scheduleHide);

      /* 扇形超窗滚轮滑动：二级扇形展开时优先滚二级，否则滚一级；不超载则不拦截页面滚动 */
      document.addEventListener('wheel', e => {
        if (document.body.classList.contains('px-shut')) return;
        let st = null, layer = null;
        if (fan2State && fan2State.entries.length > WIN) { st = fan2State; layer = fan2; }
        else if (!fan2State && fan1State && fan1State.entries.length > WIN) { st = fan1State; layer = fan1; }
        if (!st) return;
        e.preventDefault();
        const maxOff = st.entries.length - WIN;
        const no = Math.max(0, Math.min(maxOff, st.off + (e.deltaY > 0 ? 1 : -1)));
        if (no === st.off) return;
        st.off = no;
        if (layer === fan1) {
          fan2.innerHTML = ''; fan2State = null;
          fan1.classList.remove('dim');
        }
        drawFan(layer, st, true);
      }, { passive: false });

      /* 内容页：点菜单之外的背景（或按 Esc）把菜单收回小骰，正文挤占回页面 */
      if (!isHome) {
        document.addEventListener('click', e => {
          if (document.body.classList.contains('px-shut')) return;
          if (e.target.closest && e.target.closest('#pxOrb')) return;
          collapseOrb();
        });
        document.addEventListener('keydown', e => {
          if (e.key === 'Escape' && !document.body.classList.contains('px-shut')) collapseOrb();
        });
      }

      /* ── D20 掷骰 → 今日报纸（骰子为报纸唯一入口；报纸每次加载随机换一批） ── */
      const die = orb.querySelector('#pxDie');
      const num = orb.querySelector('#pxDieNum');
      const cap = orb.querySelector('#pxDieCap');
      const rootUrl = (document.getElementById('cssPixel').getAttribute('href') || '').replace(/pixel\.css$/, '');
      let rolling = false;

      function jumpPaper() {
        location.href = rootUrl + 'newspaper.html';
      }
      function land(final) {
        num.textContent = final;
        die.classList.remove('spinning');
        die.classList.add('gold');
        /* 落定后才出现「今日报纸」内容 */
        cap.textContent = '今日报纸 · NO.' + final;
        cap.classList.add('on');
      }
      function roll() {
        if (rolling) return;
        rolling = true;
        const final = 1 + ((Math.random() * 20) | 0);
        if (reduceMotion) {
          land(final);
          setTimeout(jumpPaper, 300);
          return;
        }
        die.classList.add('spinning');
        let ticks = 0;
        const total = 13 + ((Math.random() * 6) | 0);
        const iv = setInterval(() => {
          num.textContent = 1 + ((Math.random() * 20) | 0);
          if (++ticks >= total) {
            clearInterval(iv);
            land(final);
            setTimeout(jumpPaper, 750);
          }
        }, 70);
      }
      /* 收缩态：骰子是菜单开关（点了展开圆环）；展开态：骰子掷今日报纸 */
      function dieTap() {
        if (document.body.classList.contains('px-shut')) { expandOrb(); return; }
        roll();
      }
      die.addEventListener('click', dieTap);
      die.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); dieTap(); }
      });
    })();
  </script>
</body>
</html>
